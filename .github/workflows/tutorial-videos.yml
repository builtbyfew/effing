name: Tutorial videos

on:
  push:
    branches:
      - main
    paths:
      - "demos/tutorial/**"
      - ".github/workflows/tutorial-videos.yml"
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  generate:
    name: Generate and publish tutorial videos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter "@effing/tutorial..." build

      - name: Generate tutorial videos
        run: pnpm --filter @effing/tutorial start

      - name: Publish to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
          AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
        run: |
          aws s3 cp demos/tutorial/out/ s3://effing-static-assets/tutorial/ \
            --recursive --exclude "*" --include "*.mp4" \
            --content-type video/mp4 \
            --endpoint-url "${{ secrets.R2_ENDPOINT_URL }}"
