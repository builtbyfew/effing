name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, lint, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Workspace packages resolve each other's types from dist/, so
      # typecheck and tests need the packages built first. Demos are
      # excluded (as in the release script): the starter demo's build
      # needs the effing CLI bin, which pnpm only links when the dev
      # package's dist/ already exists at install time.
      - name: Build packages
        run: pnpm -r --filter "./packages/*" run build

      - name: Typecheck
        run: pnpm -w typecheck

      - name: Lint
        run: pnpm -w exec eslint .

      - name: Test
        run: pnpm -w test
